<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h4>Agregar Libro</h4>
      </div>
      <div class="card-body">

        @if (errorMessage) {
          <div class="alert alert-danger">{{ errorMessage }}</div>
        }

        <form (ngSubmit)="onSubmit()">

          <div class="mb-3">
            <label class="form-label">Título *</label>
            <input type="text" class="form-control"
              [(ngModel)]="book.title" name="title" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Autor *</label>
            <input type="text" class="form-control"
              [(ngModel)]="book.author" name="author" required>
          </div>

          <div class="mb-3">
            <label class="form-label">ISBN (13 caracteres) *</label>
            <input type="text" class="form-control"
              [(ngModel)]="book.isbn" name="isbn"
              required minlength="13" maxlength="13">
          </div>

          <div class="mb-3">
            <label class="form-label">Año de publicación *</label>
            <input type="number" class="form-control"
              [(ngModel)]="book.publicationYear" name="publicationYear"
              required min="1000" max="2026">
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="button" class="btn btn-secondary"
              (click)="cancel()">Cancelar</button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
